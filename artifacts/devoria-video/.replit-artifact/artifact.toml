kind = "video"
previewPath = "/devoria-video/"
title = "Devoria Tech Software Ad"
version = "1.0.0"
id = "artifacts/devoria-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/devoria-video/" ]
localPort = 25201

[services.development]
run = "pnpm --filter @workspace/devoria-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devoria-video", "run", "build" ]
publicDir = "artifacts/devoria-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25201"
BASE_PATH = "/devoria-video/"
