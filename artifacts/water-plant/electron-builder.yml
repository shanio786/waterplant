appId: com.devoriatech.waterplantmanager
productName: Water Plant Manager
copyright: "© 2026 Devoria Tech | +92 311 7597815"

directories:
  buildResources: public
  output: dist-electron

files:
  - dist/**/*
  - electron/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon.png
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: true
  perMachine: false
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Water Plant Manager
  installerHeaderIcon: public/icon.png
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  installerLanguages:
    - en_US

mac:
  target: dmg
  icon: public/icon.png

linux:
  target: AppImage
  icon: public/icon.png
