appId: com.devoriatech.waterplantmanager
productName: Water Plant Manager
copyright: "© 2026 Devoria Tech | +92 311 7597815"

asar: false

directories:
  buildResources: public
  output: dist-electron

files:
  - dist/**/*
  - electron/**/*
  - package.json

win:
  target:
    - target: portable
      arch:
        - x64
  icon: public/icon.png
  requestedExecutionLevel: asInvoker

portable:
  artifactName: "Water Plant Manager.exe"

mac:
  target: dmg
  icon: public/icon.png

linux:
  target: AppImage
  icon: public/icon.png
