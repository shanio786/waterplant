kind = "web"
previewPath = "/"
title = "Water Plant Manager"
version = "1.0.0"
id = "artifacts/water-plant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21762

[services.development]
run = "pnpm --filter @workspace/water-plant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/water-plant", "run", "build" ]
publicDir = "artifacts/water-plant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21762"
BASE_PATH = "/"
